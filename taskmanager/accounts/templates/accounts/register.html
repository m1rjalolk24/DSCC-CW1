{% extends 'base.html' %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 2rem auto;">
    <h1>Register</h1>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div class="form-group">
                <label>{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <p style="color:red; font-size:0.85rem;">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
        {% endfor %}
        <button type="submit" class="btn btn-success">Register</button>
    </form>
    <p style="margin-top:1rem;">Already have an account? <a href="{% url 'login' %}">Login</a></p>
</div>
{% endblock %}
