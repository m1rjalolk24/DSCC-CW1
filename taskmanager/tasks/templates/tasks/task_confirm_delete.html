{% extends 'base.html' %}
{% block title %}Delete Task{% endblock %}

{% block content %}
<div class="card">
    <h1>Delete Task</h1>
    <p>Are you sure you want to delete "<strong>{{ task.title }}</strong>"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'task-list' %}" class="btn btn-primary">Cancel</a>
    </form>
</div>
{% endblock %}
